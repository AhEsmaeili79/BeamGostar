{% load static %}

<!DOCTYPE html>
<html dir="rtl" lang="fa" class="h-100">
<head>
    <meta charset="utf-8" />
    <title>ورود</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A fully responsive premium admin dashboard template" />
    <meta name="author" content="Techzaa" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <link rel="stylesheet" href="{% static 'assets/css/app.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/icons.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/fontiran.min.css' %}">
    <script src="{% static 'assets/js/config.js' %}"></script>
</head>

<body class="h-100">
    <div class="d-flex flex-column h-100 p-3">
        <div class="d-flex flex-column flex-grow-1">
            <div class="row h-100">
                <div class="col-xxl-7">
                    <div class="row justify-content-center h-100">
                        <div class="col-lg-6 py-lg-5">
                            <div class="d-flex flex-column h-100 justify-content-center">
                                <div class="auth-logo mb-4">
                                    <a href="#" class="logo-dark">
                                        <img src="{% static 'assets/images/login_logo.png' %}" height="50" alt="لوگوی تاریک">
                                    </a>
    
                                    <a href="#" class="logo-light">
                                        <img src="{% static 'assets/images/login_logo.png' %}" height="50" alt="لوگوی روشن">
                                    </a>
                                </div>
    
                                <h2 class="fw-bold fs-24">ورود</h2>
    
                                <p class="text-muted mt-1 mb-4">نام کاربری و کلمه عبور خود را وارد کنید تا به پنل مدیریت دسترسی پیدا کنید.</p>
    
                                {% if messages %}
                                    <div class="alert alert-danger">
                                        {% for message in messages %}
                                            <p>{{ message }}</p>
                                        {% endfor %}
                                    </div>
                                {% endif %}
    
                                <div class="mb-5">
                                    <form method="POST" action="{% url 'admin_panel:login' %}" class="authentication-form">
                                        {% csrf_token %}
                                        <div class="mb-3">
                                            <label class="form-label" for="example-username">نام کاربری</label>
                                            <input type="username" id="example-username" name="username" class="form-control bg-" placeholder="نام کاربری خود را وارد کنید" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label" for="example-password">کلمه عبور</label>
                                            <input type="password" id="example-password" class="form-control" placeholder="کلمه عبور خود را وارد کنید" name="password" required>
                                        </div>
                                        <div class="mb-3">
                                            <div class="form-check">
                                                <input type="checkbox" class="form-check-input" id="checkbox-signin">
                                                <label class="form-check-label" for="checkbox-signin">مرا به خاطر بسپار</label>
                                            </div>
                                        </div>
                                    
                                        <div class="mb-1 text-center d-grid">
                                            <button class="btn btn-soft-primary" type="submit">ورود</button>
                                        </div>
                                    </form>
                                    
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
    
                <div class="col-xxl-5 d-none d-xxl-flex">
                    <div class="card h-100 mb-0 overflow-hidden">
                        <div class="d-flex flex-column h-100">
                            <img src="{% static 'assets/images/small/img-10.jpg' %}" alt="" class="w-100 h-100">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="{% static 'assets/js/app.js' %}"></script>
    <script src="{% static 'assets/js/layout.js' %}"></script>
</body>
</html>
