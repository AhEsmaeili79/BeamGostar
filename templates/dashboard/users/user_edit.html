{% extends "../base.html" %}
{% load static %}

{% block content %}
  <div class="page-content">
      <div class="container-fluid">
          <div class="row">
              <div class="col-xl-9 col-lg-8">
                <div class="card">
                  <div class="card-header">
                    <h4 class="card-title">ویرایش پروفایل</h4>
                  </div>
                  <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                      {% csrf_token %}
                      
                      <div class="mb-3">
                        <label for="first_name" class="form-label">نام</label>
                        <input type="text" id="first_name" class="form-control" name="first_name" value="{{ user.first_name }}" />
                      </div>

                      <div class="mb-3">
                        <label for="last_name" class="form-label">نام خانوادگی</label>
                        <input type="text" id="last_name" class="form-control" name="last_name" value="{{ user.last_name }}" />
                      </div>

                      <div class="mb-3">
                        <label for="father_name" class="form-label">نام پدر</label>
                        <input type="text" id="father_name" class="form-control" name="father_name" value="{{ user.father_name }}" />
                      </div>

                      <div class="mb-3">
                        <label for="gender" class="form-label">جنسیت</label>
                        <select id="gender" class="form-control" name="gender">
                          <option value="M" {% if user.gender == 'M' %}selected{% endif %}>مرد</option>
                          <option value="F" {% if user.gender == 'F' %}selected{% endif %}>زن</option>
                        </select>
                      </div>

                      <div class="mb-3">
                        <label for="national_id" class="form-label">کد ملی</label>
                        <input type="text" id="national_id" class="form-control" name="national_id" value="{{ user.national_id }}" />
                      </div>

                      <div class="mb-3">
                        <label for="id_number" class="form-label">شماره شناسنامه</label>
                        <input type="text" id="id_number" class="form-control" name="id_number" value="{{ user.id_number }}" />
                      </div>

                      <div class="mb-3">
                        <label for="date_of_birth" class="form-label">تاریخ تولد</label>
                        <input type="date" id="date_of_birth" class="form-control" name="date_of_birth" value="{{ user.date_of_birth }}" />
                      </div>

                      <div class="mb-3">
                        <label for="province" class="form-label">استان</label>
                        <input type="text" id="province" class="form-control" name="province" value="{{ user.province }}" />
                      </div>

                      <div class="mb-3">
                        <label for="city" class="form-label">شهر</label>
                        <input type="text" id="city" class="form-control" name="city" value="{{ user.city }}" />
                      </div>

                      <div class="mb-3">
                        <label for="role" class="form-label">نوع همکاری</label>
                        <select id="role" class="form-control" name="role">
                          <!-- Populate this with available roles from your UserRole model -->
                          {% for role in user_roles %}
                            <option value="{{ role.id }}" {% if user.role.id == role.id %}selected{% endif %}>{{ role.name }}</option>
                          {% endfor %}
                        </select>
                      </div>

                      <div class="mb-3">
                        <label for="work_group" class="form-label">گروه کاری</label>
                        <select id="work_group" class="form-control" name="work_group">
                          <!-- Populate with work groups -->
                          {% for group in work_groups %}
                            <option value="{{ group.id }}" {% if user.work_group.id == group.id %}selected{% endif %}>{{ group.name }}</option>
                          {% endfor %}
                        </select>
                      </div>

                      <div class="mb-3">
                        <label for="status" class="form-label">وضعیت</label>
                        <select id="status" class="form-control" name="status">
                          <option value="ACTIVE" {% if user.status == 'ACTIVE' %}selected{% endif %}>فعال</option>
                          <option value="INACTIVE" {% if user.status == 'INACTIVE' %}selected{% endif %}>غیرفعال</option>
                        </select>
                      </div>

                      <div class="mb-3">
                        <label for="phone_type" class="form-label">نوع تلفن</label>
                        <input type="text" id="phone_type" class="form-control" name="phone_type" value="{{ user.phone_type }}" />
                      </div>

                      <div class="mb-3">
                        <label for="phone_number" class="form-label">شماره تلفن</label>
                        <input type="text" id="phone_number" class="form-control" name="phone_number" value="{{ user.phone_number }}" />
                      </div>

                      <div class="mb-3">
                        <label for="priority" class="form-label">اولویت</label>
                        <input type="number" id="priority" class="form-control" name="priority" value="{{ user.priority }}" />
                      </div>

                      <div class="mb-3">
                        <label for="username" class="form-label">نام کاربری</label>
                        <input type="text" id="username" class="form-control" name="username" value="{{ user.username }}" />
                      </div>

                      <div class="mb-3">
                        <label for="password" class="form-label">رمز عبور</label>
                        <input type="password" id="password" class="form-control" name="password" value="{{ user.password }}" />
                      </div>

                      <div class="mb-3">
                        <label for="user_type" class="form-label">نوع کاربری</label>
                        <select id="user_type" class="form-control" name="user_type">
                          <option value="customer" {% if user.user_type == 'customer' %}selected{% endif %}>مشتری</option>
                          <option value="admin" {% if user.user_type == 'admin' %}selected{% endif %}>ادمین</option>
                        </select>
                      </div>

                      <div class="mb-3">
                        <label for="description" class="form-label">توضیحات</label>
                        <textarea id="description" class="form-control" name="description">{{ user.description }}</textarea>
                      </div>

                      <div class="mb-3">
                        <label for="profile_picture" class="form-label">عکس پرسنلی</label>
                        <input type="file" id="profile_picture" name="profile_picture" class="form-control" />
                      </div>

                      <button type="submit" class="btn btn-primary">ذخیره تغییرات</button>
                    </form>
                  </div>
                </div>
              </div>
          </div>
      </div>
  </div>
{% endblock %}
