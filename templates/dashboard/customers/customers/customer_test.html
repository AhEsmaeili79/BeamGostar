{% extends "../../base.html" %}
{% load static %}

{% block content %}
<div class="container-fluid">
    <form id="customerForm" method="POST" action="{% url 'customer_add' %}">
        {% csrf_token %}
        <div class="row">
            <div class="col-xl-12">
                <div class="card">
                    <div class="card-header"><h4 class="card-title">اطلاعات مشتریان</h4></div>
                    <div class="card-body ">
                        <div class="row">
                            <div class="col-lg-4">
                                <label for="customer-type" class="form-label">نوع مشتری</label>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="form-check ps-4">
                                        <input type="radio" class="form-check-input rounded-circle mt-0 fs-18"  value="real" name="customer-type" id="customer-real" checked>
                                        <label class="form-check-label" for="customer-real">حقیقی</label>
                                    </div>
                                    <div class="form-check ps-4">
                                        <input type="radio" class="form-check-input rounded-circle mt-0 fs-18" value="legal" name="customer-type" id="customer-legal">
                                        <label class="form-check-label" for="customer-legal">حقوقی</label>
                                    </div>
                                </div>
                            </div>
                            <!-- Nationality -->
                            <div class="col-lg-4">
                                <label for="nationality" class="form-label">تابعیت</label>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="form-check ps-4">
                                        <input type="radio" class="form-check-input rounded-circle mt-0 fs-18" value="iranian" name="nationality" id="iranian" checked>
                                        <label class="form-check-label" for="iranian">ایرانی</label>
                                    </div>
                                    <div class="form-check ps-4">
                                        <input type="radio" class="form-check-input rounded-circle mt-0 fs-18" value="foreign" name="nationality" id="foreign">
                                        <label class="form-check-label" for="foreign">خارجی</label>
                                    </div>
                                </div>
                            </div>
                            <!-- Payment Type -->
                            <div class="col-lg-4">
                                <label for="payment-type" class="form-label">نوع تسویه</label>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="form-check ps-4">
                                        <input type="radio" class="form-check-input rounded-circle mt-0 fs-18" value="cash" name="payment-type" id="cash" checked>
                                        <label class="form-check-label" for="cash">نقدی</label>
                                    </div>
                                    <div class="form-check ps-4">
                                        <input type="radio" class="form-check-input rounded-circle mt-0 fs-18" value="credit" name="payment-type" id="credit">
                                        <label class="form-check-label" for="credit">اعتباری</label>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-1"></div>
                            <!-- Name Fields (Persian and English) -->
                            <div class="col-lg-6" id="first-name-container">
                                <div class="mb-2"></div>
                                <label for="first-name" class="form-label">نام(فارسی)</label>
                                <input type="text" id="first-name" class="form-control" name="first-name" placeholder="نام را وارد کنید" />
                            </div>
                            <div class="col-lg-6" id="last-name-container">
                                <div class="mb-2"></div>
                                <label for="last-name" class="form-label">نام خانوادگی(فارسی)</label>
                                <input type="text" id="last-name" class="form-control" name="last-name" placeholder="نام خانوادگی را وارد کنید" />
                            </div>
                            <div class="col-lg-6" id="first-name-en-container">
                                <div class="mb-2"></div>
                                <label for="first-name-en" class="form-label">نام(انگلیسی)</label>
                                <input type="text" id="first-name-en" class="form-control" name="first-name-en" placeholder="نام را به انگلیسی وارد کنید" />
                            </div>
                            <div class="col-lg-6" id="last-name-en-container">
                                <div class="mb-2"></div>
                                <label for="last-name-en" class="form-label">نام خانوادگی(انگلیسی)</label>
                                <input type="text" id="last-name-en" class="form-control" name="last-name-en" placeholder="نام خانوادگی را به انگلیسی وارد کنید" />
                            </div>
                            <div class="col-lg-4" id="national-code-container">
                                <div class="mb-2"></div>
                                <label for="national-code" class="form-label" id="id-label">کد ملی</label>
                                <div class="input-group mb-1">
                                    <span class="input-group-text fs-20"><iconify-icon icon="solar:user-bold" class="fs-20"></iconify-icon></span>
                                    <input type="text" id="national-code" class="form-control" name="national-code" placeholder="کد ملی را وارد کنید" />
                                </div>
                            </div>
                            <div class="col-lg-4" id="birth-date-container">
                                <div class="mb-2"></div>
                                <label for="birth-date" class="form-label">تاریخ تولد</label>
                                <div class="input-group mb-1">
                                    <span class="input-group-text fs-20"><iconify-icon icon="solar:calendar-linear" class="fs-20"></iconify-icon></span>
                                    <input type="date" id="birth-date" class="form-control" name="birth-date" placeholder="تاریخ تولد" />
                                </div>
                            </div>
                            <div class="col-lg-4" id="phone-number-container">
                                <div class="mb-2"></div>
                                <label for="phone-number" class="form-label">شماره همراه</label>
                                <div class="input-group mb-1">
                                    <span class="input-group-text fs-20"><iconify-icon icon="solar:outgoing-call-rounded-bold-duotone" class="fs-20"></iconify-icon></span>
                                    <input type="text" id="phone-number" class="form-control" name="phone-number" placeholder="شماره همراه" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><h4 class="card-title">سایر اطلاعات</h4></div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-lg-6">
                                <label for="email" class="form-label">ایمیل</label>
                                <div class="input-group mb-1">
                                    <span class="input-group-text fs-20">
                                        <iconify-icon icon="solar:letter-bold-duotone" class="fs-18"></iconify-icon>
                                    </span>
                                    <input type="text" id="email" class="form-control" name="email" placeholder="ایمیل را اضافه کنید" />
                                </div>
                            </div>
                            <div class="col-lg-6">
                                <label for="zipcode" class="form-label">کد پستی</label>
                                <div class="input-group mb-1">
                                    <span class="input-group-text fs-20">
                                        <iconify-icon icon="solar:mailbox-outline" class="fs-18"></iconify-icon>
                                    </span>
                                    <input type="text" id="zipcode" class="form-control" name="zipcode" placeholder="کد پستی را اضافه کنید" />
                                </div>
                            </div>
                            <div class="col-lg-12">
                                <label for="address" class="form-label">آدرس</label>
                                <div class="input-group mb-1">
                                    <span class="input-group-text fs-20"><iconify-icon icon="solar:point-on-map-bold-duotone" class="fs-18"></iconify-icon></span>
                                    <input type="text" id="address" class="form-control" name="address" placeholder="آدرس را اضافه کنید" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="p-3 bg-light mb-1 rounded">
                    <div class="row justify-content-end g-2">
                        <div class="col-lg-2">
                            <button type="submit" class="btn btn-outline-secondary w-100">ذخیره تغییرات</button>
                        </div>
                        <div class="col-lg-2">
                            <a href="#!" class="btn btn-primary w-100">لغو</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const realRadioButton = document.getElementById('customer-real');
        const legalRadioButton = document.getElementById('customer-legal');
        const iranianRadioButton = document.getElementById('iranian');
        const foreignRadioButton = document.getElementById('foreign');
        const nationalCodeContainer = document.getElementById('national-code-container');

        // Fields for حقیقی customer type
        const realFields = [
            'first-name-container', 'last-name-container', 'first-name-en-container', 
            'last-name-en-container', 'national-code-container', 'birth-date-container', 'phone-number-container'
        ];

        // Legal fields to be added dynamically
        const legalFields = [
            { id: 'legal-field-1', label: '(فارسی)نام شرکت', placeholder: 'نام شرکت را وارد کنید', name: 'company_name', size: 'col-lg-6' },
            { id: 'legal-field-2', label: 'نام شرکت(انگلیسی)', placeholder: 'نام شرکت را به انگلیسی وارد کنید', name: 'company_name_en', size: 'col-lg-6' },
            { id: 'legal-field-3', label: 'نام رابط(فارسی)', placeholder: 'نام رابط را وارد کنید', name: 'contact_name_fa', size: 'col-lg-6' },
            { id: 'legal-field-4', label: 'نام خانوادگی رابط(فارسی)', placeholder: 'نام خانوادگی رابط را وارد کنید', name: 'contact_lastname_fa', size: 'col-lg-6' },
            { id: 'legal-field-5', label: 'نام رابط(انگلیسی)', placeholder: 'نام رابط را به انگلیسی وارد کنید', name: 'contact_name_en', size: 'col-lg-4' },
            { id: 'legal-field-6', label: 'نام خانوادگی رابط(انگلیسی)', placeholder: 'نام خانوادگی رابط را به انگلیسی وارد کنید', name: 'contact_lastname_en', size: 'col-lg-4' },
            { id: 'legal-field-7', label: 'کد اقتصادی', placeholder: 'کد اقتصادی را وارد کنید', name: 'economy_code', size: 'col-lg-4' },
            { id: 'legal-field-8', label: 'شناسه ملی', placeholder: 'شناسه ملی را وارد کنید', name: 'national_id', icon: 'solar:user-bold', size: 'col-lg-4' },
            { id: 'legal-field-9', label: 'شماره همراه', placeholder: 'شماره همراه را وارد کنید', name: 'phone_number', icon: 'solar:outgoing-call-rounded-bold-duotone', size: 'col-lg-4' },
            { id: 'legal-field-10', label: 'شماره تماس شرکت', placeholder: 'شماره تماس شرکت را وارد کنید', name: 'company_phone', icon: 'solar:outgoing-call-rounded-bold-duotone', size: 'col-lg-4' }
        ];

        // Function to handle the change event when customer type or nationality is selected
        function handleCustomerTypeChange() {
            const isLegal = legalRadioButton.checked;
            const isIranian = iranianRadioButton.checked;
            const isForeign = foreignRadioButton.checked;

            // Show/Hide fields based on the selected customer type
            if (isLegal) {
                toggleFieldsVisibility(realFields, false); // Hide real customer fields
                addLegalFields(); // Add legal customer fields dynamically
                nationalCodeContainer.style.display = 'none'; // Hide national code for legal customers
            } else {
                toggleFieldsVisibility(realFields, true); // Show real customer fields
                removeLegalFields(); // Remove any dynamically added legal fields
                handleNationalityChange(isIranian, isForeign); // Adjust national code visibility
            }
        }

        // Toggle visibility of real customer fields
        function toggleFieldsVisibility(fields, show) {
            fields.forEach(fieldId => {
                const fieldElement = document.getElementById(fieldId);
                if (fieldElement) {
                    fieldElement.style.display = show ? 'block' : 'none';
                }
            });
        }

        // Add legal fields dynamically to the form
        function addLegalFields() {
            // Remove any existing legal fields before adding new ones
            document.querySelectorAll('.dynamic-field').forEach(field => field.remove());

            legalFields.forEach(field => {
                const newInputContainer = document.createElement('div');
                newInputContainer.classList.add(field.size, 'dynamic-field');
                newInputContainer.innerHTML = `
                    <div class="mb-2"></div>
                    <label for="${field.id}" class="form-label">${field.label}</label>
                    ${field.icon ? `<div class="input-group mb-1">` : ''}
                    ${field.icon ? `<span class="input-group-text fs-20"><iconify-icon icon="${field.icon}" class="fs-20"></iconify-icon></span>` : ''}
                    <input type="text" id="${field.id}" name="${field.name}" class="form-control" placeholder="${field.placeholder}" />
                    ${field.icon ? `</div>` : ''}
                `;
                const nationalIdContainer = document.getElementById('national-code-container');
                nationalIdContainer.parentNode.insertBefore(newInputContainer, nationalIdContainer);
            });
        }

        // Remove dynamically added legal fields
        function removeLegalFields() {
            document.querySelectorAll('.dynamic-field').forEach(field => field.remove());
        }

        // Adjust the national code field based on nationality selection
        function handleNationalityChange(isIranian, isForeign) {
            if (isIranian || isForeign) {
                nationalCodeContainer.style.display = 'block';
                const nationalCodeLabel = nationalCodeContainer.querySelector('label');
                const nationalCodeInput = nationalCodeContainer.querySelector('input');

                if (isForeign) {
                    nationalCodeLabel.textContent = 'شماره گذرنامه';
                    nationalCodeInput.name = 'passport';
                    nationalCodeInput.placeholder = 'شماره گذرنامه را وارد کنید';
                } else {
                    nationalCodeLabel.textContent = 'کد ملی';
                    nationalCodeInput.name = 'national-code';
                    nationalCodeInput.placeholder = 'کد ملی را وارد کنید';
                }
            } else {
                nationalCodeContainer.style.display = 'none';
            }
        }

        // Add event listeners for changes in customer type and nationality
        realRadioButton.addEventListener('change', handleCustomerTypeChange);
        legalRadioButton.addEventListener('change', handleCustomerTypeChange);
        iranianRadioButton.addEventListener('change', handleCustomerTypeChange);
        foreignRadioButton.addEventListener('change', handleCustomerTypeChange);

        // Initial check for the default selection
        handleCustomerTypeChange();
    });
</script>

{% endblock %}
